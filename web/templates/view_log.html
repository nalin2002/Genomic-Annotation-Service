<!--
view_log.html - Display contents of an annotation log file
https://developer.mozilla.org/en-US/docs/Web/HTML/Element/pre
-->

{% extends "base.html" %}

{% block title %}Annotation Log{% endblock %}

{% block body %}

    {% include "header.html" %}

    <div class="container">

        <div class="page-header">
            <h1>Annotation Log</h1>
        </div>

        <p>
            <strong>Job ID:</strong> {{ job.get('job_id', '') }}
        </p>

        <pre style="white-space: pre-wrap;">{{ log }}</pre>

        <hr />
        <a href="{{ url_for('annotation_details', id=job['job_id']) }}">&larr; back to job details</a>

    </div> <!-- container -->

{% endblock %}
