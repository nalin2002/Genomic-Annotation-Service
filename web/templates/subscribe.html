{% extends "base.html" %}

{% block title %}Subscribe{% endblock %}

{% block body %}

    {% include "header.html" %}

    <!-- Captures the user's credit card information and uses Javascript to send to Stripe -->
    <div class="container">

        <div class="page-header">
            <h1>Subscribe</h1>
        </div>

        <p>You are subscribing to the GAS Premium plan. Please enter your credit card details to complete your subscription.</p><br />

        <div class="form-wrapper">
            <form role="form" action="{{url_for('subscribe')}}" method="post" id="subscribe_form" name="subscribe_submit">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

                <span class="payment-errors"></span>

                <!-- GET USER CREDIT CARD DETAILS -->
                <!-- Name on card -->
                <div class="form-group">
                    <label>Name on Credit Card</label>
                    <input class="form-control input-lg required"
                           type="text"
                           data-stripe="name" />
                </div>

                <!-- Card number -->
                <div class="form-group">
                    <label>Credit Card Number</label>
                    <input class="form-control input-lg required"
                           type="text"
                           size="20"
                           placeholder="4242 4242 4242 4242"
                           data-stripe="number" />
                </div>

                <!-- CVC -->
                <div class="form-group">
                    <label>Credit Card Verification Code (CVC)</label>
                    <input class="form-control input-lg required"
                           type="text"
                           size="4"
                           data-stripe="cvc" />
                </div>

                <!-- Expiration month -->
                <div class="form-group">
                    <label>Expiration Month</label>
                    <input class="form-control input-lg required"
                           type="text"
                           size="2"
                           placeholder="MM"
                           data-stripe="exp-month" />
                </div>

                <!-- Expiration year -->
                <div class="form-group">
                    <label>Expiration Year</label>
                    <input class="form-control input-lg required"
                           type="text"
                           size="4"
                           placeholder="YYYY"
                           data-stripe="exp-year" />
                </div>

                <br />

                <div class="form-actions">
                    <input id="bill-me"
                           class="btn btn-lg btn-primary"
                           type="submit"
                           value="Subscribe (your credit card will not be billed)">
                </div>

            </form>
        </div>
    
    </div> <!-- container -->

{% endblock %}
