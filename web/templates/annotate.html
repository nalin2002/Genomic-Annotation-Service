{% extends "base.html" %}

{% block title %}Annotate{% endblock %}

{% block body %}

    {% include "header.html" %}

    <div class="container">
    
        <div class="page-header">
            <h1>Annotate VCF File</h1>
        </div>

        <div class="form-wrapper">
            <form role="form" action="{{ s3_post.url }}" method="post" enctype="multipart/form-data">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                {% for key, value in s3_post.fields.items() %}
                <input type="hidden" name="{{ key }}" value="{{ value }}" />
                {% endfor %}

                <div class="row">
                    <div class="form-group col-md-6">
                        <label id="upload">Select VCF Input File</label>
                        <div class="input-group col-md-12">
                            <span class="input-group-btn">
                                <span class="btn btn-default btn-file btn-lg">Browse&hellip; <input type="file" name="file" id="upload-file" /></span>
                            </span>
                            <input type="text" class="form-control col-md-6 input-lg" readonly />
                        </div>
                    </div>
                </div>

                <br />

                <div class="form-actions">
                    <input class="btn btn-lg btn-primary" type="submit" value="Annotate" id="annotateButton" />
                </div>
            </form>
        </div>

        <script>
        document.getElementById("annotateButton").addEventListener("click", function(e) {

        const role = "{{ role }}";
        const fileInput = document.getElementById("upload-file");

        if (!fileInput.files.length) {
            return;
        }

        const file = fileInput.files[0];
        const maxSize = 150 * 1024; // 150KB

        if (role === "free_user" && file.size > maxSize) {
            e.preventDefault();

            alert("Free users can only upload files up to 150KB. Please subscribe to Premium to upload larger files.");

            window.location.href = "{{ url_for('subscribe') }}";
        }
        });


        </script>
    
    </div> <!-- container -->

{% endblock %}
